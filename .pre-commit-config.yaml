repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check (python)
        entry: .venv/bin/python -m ruff check --fix
        language: system
        files: ^app/.*\.py$
        types_or: [python]

      - id: ruff-format
        name: ruff-format (python)
        entry: .venv/bin/python -m ruff format
        language: system
        files: ^app/.*\.py$
        types_or: [python]

      - id: eslint-static-js
        name: eslint (static js)
        entry: npx eslint
        language: system
        files: ^static/js/.*\.js$
        types_or: [javascript]

      - id: htmlhint-static-html
        name: htmlhint (static html)
        entry: npx htmlhint
        language: system
        files: ^static/.*\.html$
        types_or: [html]
