<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room2Learn | 360 Viewer</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      background: #05060a;
      color: #e7ecff;
      font-family: Inter, Segoe UI, sans-serif;
      overflow: hidden;
    }

    #viewer-root {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #scene-container {
      width: 100%;
      height: 100%;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .pill {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(10, 12, 20, 0.72);
      border: 1px solid rgba(160, 174, 255, 0.35);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    #viewer-message {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(5, 8, 14, 0.85);
      text-align: center;
      padding: 24px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="viewer-root">
    <div id="hud">
      <div class="pill">Room2Learn 360 Mode</div>
      <button id="close-btn" class="pill" type="button">Close Tab</button>
    </div>
    <div id="scene-container"></div>
    <div id="viewer-message"></div>
  </div>
  <script type="module" src="/static/js/viewer.js"></script>
</body>
</html>
